name: Gold Signal Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: gold-signal-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gold signal bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated price history
        if: always()
        run: |
          git config user.name "gold-signal-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -f data/price_history.csv ]; then
            git add data/price_history.csv
            git diff --cached --quiet && echo "تغییری برای commit وجود ندارد" || git commit -m "chore: update gold price history [skip ci]"
            git push
          else
            echo "فایل price_history.csv پیدا نشد - مرحله قبلی احتمالا با خطا مواجه شده"
